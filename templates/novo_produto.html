{% extends 'base.html' %}
{% block titulo %}Novo Produto — ModaAtende{% endblock %}

{% block conteudo %}

<!-- Cabeçalho da página -->
<div class="cabecalho-pagina animar">
  <a href="{{ url_for('listar_produtos') }}" class="voltar">← Voltar para Estoque</a>
  <h1 class="titulo-pagina">Novo <span class="destaque">Produto</span></h1>
  <p class="subtitulo-pagina">Adicione um novo produto ao controle de estoque.</p>
</div>

<!-- Card do formulário -->
<div class="cartao-form animar atraso-1">

  <form method="POST" action="{{ url_for('novo_produto') }}"
        id="formNovoProduto" novalidate>
    <div class="pilha">

      <!-- Nome do produto -->
      <div class="campo">
        <label class="label" for="nome">
          Nome do Produto <span class="obrig">*</span>
        </label>
        <div class="campo-icone">
          <span class="icone-input">📦</span>
          <input
            type="text"
            id="nome"
            name="nome"
            class="input"
            placeholder="Ex: Bolsa de Couro Preta"
            required
            minlength="3"
            autocomplete="off"
          >
        </div>
      </div>

      <!-- Categoria -->
      <div class="campo">
        <label class="label" for="categoria">
          Categoria <span class="obrig">*</span>
        </label>
        <div class="campo-icone">
          <span class="icone-input">🏷️</span>
          <select id="categoria" name="categoria" class="input" required>
            <option value="">Selecione uma categoria</option>
            <option value="bolsas">Bolsas</option>
            <option value="sapatos">Sapatos</option>
            <option value="cintos">Cintos</option>
          </select>
        </div>
      </div>

      <!-- Quantidade -->
      <div class="campo">
        <label class="label" for="quantidade">
          Quantidade em Estoque
        </label>
        <div class="campo-icone">
          <span class="icone-input">🔢</span>
          <input
            type="number"
            id="quantidade"
            name="quantidade"
            class="input"
            placeholder="0"
            min="0"
            value="0"
          >
        </div>
      </div>

      <!-- Preço -->
      <div class="campo">
        <label class="label" for="preco">
          Preço (R$) <span class="obrig">*</span>
        </label>
        <div class="campo-icone">
          <span class="icone-input">💰</span>
          <input
            type="number"
            id="preco"
            name="preco"
            class="input"
            placeholder="0.00"
            step="0.01"
            min="0"
            required
          >
        </div>
      </div>

    </div>

    <!-- Botões -->
    <div class="botoes-form">
      <a href="{{ url_for('listar_produtos') }}" class="btn btn-secundario">
        ❌ Cancelar
      </a>
      <button type="submit" class="btn btn-primario">
        ➕ Adicionar Produto
      </button>
    </div>
  </form>

</div>

{% endblock %}
